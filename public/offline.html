<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoneDonaDone — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf5ff;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #8B5CF6;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      color: white;
      font-size: 2rem;
      font-weight: 700;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: #1a1a2e;
    }
    p {
      color: #6b7280;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    button {
      background: #8B5CF6;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #7c3aed; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">FC</div>
    <h1>You're offline</h1>
    <p>Connect to the internet to use DoneDonaDone. We'll be here when you're back.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
